<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #7c6df0;
    --accent2: #5a4dd4;
    --green: #22c55e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(15,15,15,0.97);
    backdrop-filter: blur(8px);
    z-index: 200;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .header-meta span { color: var(--green); }

  /* Category scroll strip (mobile + desktop) */
  .cat-strip {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 52px;
    z-index: 100;
    scrollbar-width: none;
  }

  .cat-strip::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .cat-pill:hover { border-color: var(--accent); color: var(--text); }

  .cat-pill.active {
    background: rgba(124,109,240,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    gap: 8px;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .page-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
    white-space: nowrap;
  }

  .limit-select {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
  }

  /* Main */
  main { padding: 0 16px 32px; }

  /* Grid — 1 col mobile, 2 col tablet, 3-4 col desktop */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 768px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (min-width: 1100px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:active { border-color: var(--border2); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }

  .card-name {
    font-weight: 500;
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
  }

  .price {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    white-space: nowrap;
  }

  .cat-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .card-id, .card-date {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
  }

  /* Category colors */
  .cat-Electronics { background: rgba(99,102,241,0.15); color: #818cf8; }
  .cat-Clothing    { background: rgba(236,72,153,0.15); color: #f472b6; }
  .cat-Books       { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .cat-Home        { background: rgba(20,184,166,0.15); color: #2dd4bf; }
  .cat-Sports      { background: rgba(34,197,94,0.15);  color: #4ade80; }
  .cat-Toys        { background: rgba(239,68,68,0.15);  color: #f87171; }
  .cat-Food        { background: rgba(249,115,22,0.15); color: #fb923c; }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 4px 0 8px;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active:not(:disabled) { opacity: 0.7; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .page-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    padding: 0 4px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 80px 0;
    color: var(--text3);
  }

  .empty-title { font-size: 15px; margin-bottom: 6px; color: var(--text2); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Product Browser
  </div>
  <div class="header-meta">200k products &nbsp;·&nbsp; <span>live</span></div>
</header>

<!-- Category strip — scrollable on mobile, wraps on desktop -->
<div class="cat-strip" id="cat-strip">
  <button class="cat-pill active" data-cat="" onclick="selectCategory('')">All</button>
  <button class="cat-pill" data-cat="Electronics" onclick="selectCategory('Electronics')">Electronics</button>
  <button class="cat-pill" data-cat="Clothing" onclick="selectCategory('Clothing')">Clothing</button>
  <button class="cat-pill" data-cat="Books" onclick="selectCategory('Books')">Books</button>
  <button class="cat-pill" data-cat="Home" onclick="selectCategory('Home')">Home</button>
  <button class="cat-pill" data-cat="Sports" onclick="selectCategory('Sports')">Sports</button>
  <button class="cat-pill" data-cat="Toys" onclick="selectCategory('Toys')">Toys</button>
  <button class="cat-pill" data-cat="Food" onclick="selectCategory('Food')">Food</button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <span class="page-title" id="page-title">All products</span>
    <span class="badge" id="page-badge">page 1</span>
  </div>
  <select class="limit-select" id="limit-select" onchange="changeLimit(this.value)">
    <option value="20">20 / page</option>
    <option value="40">40 / page</option>
    <option value="100">100 / page</option>
  </select>
</div>

<main>
  <div id="content"></div>
  <div class="pagination" id="pagination"></div>
</main>

<script>
const API = 'https://codevector-task-jtfe.onrender.com'

let state = {
  category: '',
  limit: 20,
  page: 1,
  cursorStack: [],
  currentCursor: null,
  nextCursor: null,
  loading: false
}

async function fetchProducts() {
  if (state.loading) return
  state.loading = true
  renderLoading()

  const params = new URLSearchParams()
  params.set('limit', state.limit)
  if (state.category) params.set('category', state.category)
  if (state.currentCursor) params.set('cursor', state.currentCursor)

  try {
    const res = await fetch(`${API}/products?${params}`)
    const data = await res.json()
    state.nextCursor = data.next_cursor
    renderProducts(data.data)
    renderPagination()
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-title">Could not reach the API</div>
        <div>${e.message}</div>
      </div>`
  } finally {
    state.loading = false
  }
}

function renderLoading() {
  document.getElementById('content').innerHTML = `
    <div class="loading"><div class="spinner"></div> Loading…</div>`
  document.getElementById('pagination').innerHTML = ''
}

function renderProducts(products) {
  document.getElementById('page-badge').textContent = `page ${state.page}`

  if (!products.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-title">No products found</div>
        <div>Try a different category</div>
      </div>`
    return
  }

  const cards = products.map(p => {
    const date = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    const shortId = p.id.split('-')[0]
    const priceFormatted = parseFloat(p.price).toLocaleString('en-US', { style: 'currency', currency: 'USD' })
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-name">${p.name}</div>
          <div class="price">${priceFormatted}</div>
        </div>
        <span class="cat-tag cat-${p.category}">${p.category}</span>
        <div class="card-footer">
          <span class="card-id">${shortId}…</span>
          <span class="card-date">${date}</span>
        </div>
      </div>`
  }).join('')

  document.getElementById('content').innerHTML = `<div class="grid">${cards}</div>`
}

function renderPagination() {
  const hasPrev = state.page > 1
  const hasNext = !!state.nextCursor
  document.getElementById('pagination').innerHTML = `
    <button class="btn" onclick="prevPage()" ${hasPrev ? '' : 'disabled'}>← Prev</button>
    <span class="page-info">Page ${state.page}</span>
    <button class="btn btn-primary" onclick="nextPage()" ${hasNext ? '' : 'disabled'}>Next →</button>
  `
}

function nextPage() {
  if (!state.nextCursor) return
  state.cursorStack.push(state.currentCursor)
  state.currentCursor = state.nextCursor
  state.page++
  fetchProducts()
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

function prevPage() {
  if (state.page <= 1) return
  state.currentCursor = state.cursorStack.pop()
  state.page--
  fetchProducts()
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

function selectCategory(cat) {
  state.category = cat
  state.page = 1
  state.currentCursor = null
  state.nextCursor = null
  state.cursorStack = []

  document.querySelectorAll('.cat-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat)
  })

  document.getElementById('page-title').textContent = cat || 'All products'
  fetchProducts()
}

function changeLimit(val) {
  state.limit = Number(val)
  state.page = 1
  state.currentCursor = null
  state.nextCursor = null
  state.cursorStack = []
  fetchProducts()
}

fetchProducts()
</script>
</body>
</html>
